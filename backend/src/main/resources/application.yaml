spring:
  application:
    name: backend
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false  # Only enabled in prod; dev uses ddl-auto, tests are disabled

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
